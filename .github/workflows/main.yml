name: Sync Fork with Upstream

on:
  schedule:
    # 每天 UTC 时间 0 点运行一次（可自定义 cron 表达式）
    - cron: '0 0 * * *'
  # 也支持手动触发，方便测试
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          # 必须拉取完整历史，否则无法合并
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: |
          # 请将 <上游仓库> 替换为实际地址，例如 https://github.com/原作者/仓库名.git
          git remote add upstream https://github.com/openwrt-xiaomi/xmir-patcher.git
          git fetch upstream
      - name: Merge upstream/main into origin/main
        run: |
          git checkout master
          # 合并上游的 main 分支（如果上游主分支叫 master，请修改此处）
          git merge upstream/main --no-edit
          git push origin main
